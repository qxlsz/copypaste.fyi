# fly.toml app configuration file generated for copypaste-fyi-withered-darkness-575 on 2025-11-02T21:10:19-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'copypaste-fyi-withered-darkness-575'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.backend'

[env]
  ROCKET_ADDRESS = '0.0.0.0'
  ROCKET_PORT = '8000'
  RUST_LOG = 'info'
  CRYPTO_VERIFIER_URL = 'http://localhost:8001'

[[services]]
  internal_port = 8000
  protocol = "tcp"
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"
    protocol = "http"
    restart_limit = 3

  [services.concurrency]
    type = "connections"
    soft_limit = 200
    hard_limit = 250

# crypto-verifier is internal-only: reachable via localhost:8001 within the
# same Fly.io VM. Removing the public [[services]] block for port 8001 to
# prevent direct internet access to the OCaml crypto verifier.

[processes]
  app = 'copypaste'
  crypto-verifier = 'crypto-verifier'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  processes = ["app"]

[[vm]]
  size = 'shared-cpu-1x'
  memory = '128mb'
  processes = ["crypto-verifier"]

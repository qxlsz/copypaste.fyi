name: Auto Research

on:
  schedule:
    - cron: '17 9 * * *' # Daily at 9:17am UTC
  workflow_dispatch: # Manual trigger

permissions:
  issues: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run competitive research
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/auto-research.sh
